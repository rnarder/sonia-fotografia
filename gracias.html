    <style>
        .thanks-section {

            border-radius: 4px;
        }
        .thanks-card h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            margin-bottom: 1rem;
            font-weight: 400;
        }
        .thanks-card p {
            color: var(--color-gray-light);
            font-size: 1.1rem;
            line-height: 1.8;

    <nav class="navbar">

        <ul class="nav-links">
